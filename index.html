<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Меню Столовой</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 16px;
            padding-bottom: 90px;
            color: #1a1a1a;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        h1 {
            font-size: 26px;
            text-align: center;
            color: #e67e22;
            margin-bottom: 20px;
        }
        .cat {
            background: white;
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .cat-title {
            font-size: 18px;
            font-weight: 700;
            color: #e67e22;
            margin-bottom: 12px;
            border-left: 4px solid #e67e22;
            padding-left: 10px;
        }
        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            gap: 8px;
        }
        .item:last-child {
            border-bottom: none;
        }
        .item-name {
            flex: 2;
            font-size: 14px;
            font-weight: 500;
        }
        .item-price {
            font-weight: 700;
            color: #e67e22;
            min-width: 60px;
            text-align: right;
            font-size: 15px;
        }
        .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .item-controls button {
            background: none;
            border: none;
            font-size: 20px;
            font-weight: bold;
            color: #e67e22;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s ease;
        }
        .item-controls button:active {
            background: rgba(0,0,0,0.1);
            transform: scale(0.95);
        }
        .item-qty {
            font-weight: 600;
            min-width: 28px;
            text-align: center;
            font-size: 15px;
        }
        .cart-block {
            background: white;
            border-radius: 18px;
            padding: 16px;
            margin-top: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .cart-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 12px;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 6px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .cart-empty {
            text-align: center;
            color: #999;
            padding: 16px;
        }
        .total {
            margin-top: 12px;
            padding-top: 12px;
            text-align: right;
            font-weight: 800;
            font-size: 18px;
            border-top: 2px solid #e67e22;
            color: #e67e22;
        }
        /* Стили для кнопок в корзине */
        .cart-remove-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.1s ease;
        }
        .cart-remove-btn:active {
            background: rgba(231, 76, 60, 0.1);
            transform: scale(0.95);
        }
        /* Отладочная панель (только для разработки) */
        .debug-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 9999;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            .debug-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🍽️ МЕНЮ СТОЛОВОЙ</h1>
    <div id="menuList"></div>
    <div class="cart-block">
        <div class="cart-title">🛒 КОРЗИНА</div>
        <div id="cartList">✨ Пусто</div>
        <div class="total" id="totalAmount">💰 ИТОГО: 0.00 ₽</div>
    </div>
</div>
<div class="debug-panel" id="debugPanel">WebApp: Загрузка...</div>

<script>
    // ---- МЕНЮ ----
    const menu = {
        "Супы": [
            { name: "Суп-пюре сырный с копчеными колбасками", price: 3.80 },
            { name: "Холодник со сметаной", price: 3.00 }
        ],
        "Гарниры": [
            { name: "Картофельное пюре", price: 2.50 },
            { name: "Спагетти со сливочным соусом", price: 2.80 }
        ],
        "Мясные": [
            { name: "Биточек из свинины", price: 6.60 },
            { name: "Филе запеченное по-французски", price: 6.70 },
            { name: "Гнездышко с ветчиной и сыром", price: 6.80 },
            { name: "Гуляш из свинины", price: 6.80 }
        ],
        "Салаты": [
            { name: "Летний", price: 3.20 },
            { name: "Свежесть", price: 2.60 }
        ],
        "Фитнес бокс": [
            { name: "Фитнес бокс с курицей", price: 8.00 }
        ],
        "Пицца/Закуски": [
            { name: "Пицца на тосте", price: 3.00 },
            { name: "Конвертик из лаваша", price: 4.00 }
        ],
        "Напитки": [
            { name: "Сок в ассортименте", price: 1.50 },
            { name: "Кефир", price: 1.00 }
        ]
    };

    let cart = {};
    let tg = null;

    // ---- Инициализация Telegram ----
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            // Настраиваем MainButton (синюю кнопку Telegram)
            tg.MainButton.setText("✅ ОФОРМИТЬ ЗАКАЗ");
            tg.MainButton.onClick(sendOrder);
            tg.MainButton.hide(); // Показываем только когда есть товары
            
            document.getElementById('debugPanel').innerHTML = 'WebApp: ✅ Telegram OK';
        } else {
            document.getElementById('debugPanel').innerHTML = 'WebApp: ⚠️ Режим браузера';
        }
    } catch(e) {
        console.error('Telegram init error:', e);
        document.getElementById('debugPanel').innerHTML = 'WebApp: ❌ Ошибка';
    }

    // ---- Отрисовка меню ----
    function renderMenu() {
        const container = document.getElementById('menuList');
        if (!container) return;
        container.innerHTML = '';
        
        for (let cat in menu) {
            const catDiv = document.createElement('div');
            catDiv.className = 'cat';
            catDiv.innerHTML = `<div class="cat-title">🍽️ ${cat}</div>`;
            
            menu[cat].forEach(item => {
                const qty = cart[item.name]?.qty || 0;
                catDiv.innerHTML += `
                    <div class="item">
                        <div class="item-name">${escapeHtml(item.name)}</div>
                        <div class="item-price">${item.price.toFixed(2)} ₽</div>
                        <div class="item-controls">
                            <button class="minus-btn" data-name="${escapeHtml(item.name)}" data-price="${item.price}">−</button>
                            <span class="item-qty">${qty}</span>
                            <button class="plus-btn" data-name="${escapeHtml(item.name)}" data-price="${item.price}">+</button>
                        </div>
                    </div>
                `;
            });
            container.appendChild(catDiv);
        }

        // Обработчики +/-
        document.querySelectorAll('.plus-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                let name = btn.dataset.name;
                let price = parseFloat(btn.dataset.price);
                if (cart[name]) {
                    cart[name].qty++;
                } else {
                    cart[name] = { price, qty: 1 };
                }
                refreshAll();
            };
        });
        
        document.querySelectorAll('.minus-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                let name = btn.dataset.name;
                if (cart[name]) {
                    if (cart[name].qty > 1) {
                        cart[name].qty--;
                    } else {
                        delete cart[name];
                    }
                    refreshAll();
                }
            };
        });
    }

    // ---- Отрисовка корзины ----
    function renderCart() {
        const cartDiv = document.getElementById('cartList');
        const totalDiv = document.getElementById('totalAmount');
        const items = Object.entries(cart);
        
        if (items.length === 0) {
            cartDiv.innerHTML = '<div class="cart-empty">✨ Корзина пуста</div>';
            totalDiv.innerHTML = '💰 ИТОГО: 0.00 ₽';
            // Скрываем кнопку Telegram
            if (tg && tg.MainButton) {
                tg.MainButton.hide();
            }
            return;
        }
        
        let total = 0;
        let html = '';
        for (let [name, data] of items) {
            const sum = data.price * data.qty;
            total += sum;
            html += `
                <div class="cart-item">
                    <span><strong>${escapeHtml(name)}</strong> × ${data.qty}</span>
                    <span style="color:#e67e22; font-weight:600;">${sum.toFixed(2)} ₽</span>
                    <button class="cart-remove-btn" data-name="${escapeHtml(name)}">🗑️</button>
                </div>
            `;
        }
        cartDiv.innerHTML = html;
        totalDiv.innerHTML = `💰 ИТОГО: ${total.toFixed(2)} ₽`;
        
        // Показываем кнопку Telegram с суммой
        if (tg && tg.MainButton) {
            tg.MainButton.setText(`✅ ОФОРМИТЬ | ${total.toFixed(2)} ₽`);
            tg.MainButton.show();
        }
        
        // Обработчики удаления
        document.querySelectorAll('.cart-remove-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                delete cart[btn.dataset.name];
                refreshAll();
            };
        });
    }

    // ---- Отправка заказа ----
    function sendOrder() {
        const items = Object.entries(cart);
        
        if (items.length === 0) {
            const msg = "🛒 Корзина пуста";
            if (tg) tg.showAlert(msg);
            else alert(msg);
            return;
        }
        
        let total = 0;
        let text = '';
        for (let [name, data] of items) {
            const sum = data.price * data.qty;
            total += sum;
            text += `${name} × ${data.qty} = ${sum.toFixed(2)} ₽\n`;
        }
        
        const orderText = `🍽️ НОВЫЙ ЗАКАЗ!\n———————————\n${text}———————————\n💰 К оплате: ${total.toFixed(2)} ₽`;
        
        const order = {
            cart: cart,
            total: total.toFixed(2),
            text: orderText
        };
        
        console.log('Отправка заказа:', order);
        
        // Отправляем в Telegram
        if (tg) {
            try {
                tg.sendData(JSON.stringify(order));
                tg.showAlert("✅ Заказ отправлен!");
                
                // Очищаем корзину
                cart = {};
                refreshAll();
                
                // Закрываем приложение через 1.5 секунды
                setTimeout(() => {
                    tg.close();
                }, 1500);
            } catch(e) {
                console.error('Ошибка отправки:', e);
                tg.showAlert("❌ Ошибка отправки заказа");
            }
        } else {
            // Режим браузера
            alert("✅ Заказ отправлен!\n\n" + orderText);
            cart = {};
            refreshAll();
        }
    }

    // ---- Вспомогательная функция для безопасности ----
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---- Полное обновление ----
    function refreshAll() {
        renderMenu();
        renderCart();
    }

    // ---- Запуск ----
    refreshAll();
    
    // Логируем для отладки
    console.log('Приложение запущено', { tg: !!tg });
</script>
</body>
</html>
