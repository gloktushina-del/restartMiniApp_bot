<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Меню</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 16px;
            padding-bottom: 90px;
            color: #1a1a1a;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        h1 {
            font-size: 26px;
            text-align: center;
            color: #e67e22;
            margin-bottom: 20px;
        }
        .cat {
            background: white;
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .cat-title {
            font-size: 18px;
            font-weight: 700;
            color: #e67e22;
            margin-bottom: 12px;
            border-left: 4px solid #e67e22;
            padding-left: 10px;
        }
        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            gap: 8px;
        }
        .item:last-child {
            border-bottom: none;
        }
        .item-name {
            flex: 2;
            font-size: 14px;
            font-weight: 500;
        }
        .item-price {
            font-weight: 700;
            color: #e67e22;
            min-width: 60px;
            text-align: right;
            font-size: 15px;
        }
        .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .item-controls button {
            background: none;
            border: none;
            font-size: 20px;
            font-weight: bold;
            color: #e67e22;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .item-controls button:active {
            background: rgba(0,0,0,0.05);
        }
        .item-qty {
            font-weight: 600;
            min-width: 28px;
            text-align: center;
            font-size: 15px;
        }
        .cart-block {
            background: white;
            border-radius: 18px;
            padding: 16px;
            margin-top: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .cart-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 12px;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 6px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .cart-remove {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 18px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .cart-empty {
            text-align: center;
            color: #999;
            padding: 16px;
        }
        .total {
            margin-top: 12px;
            padding-top: 12px;
            text-align: right;
            font-weight: 800;
            font-size: 18px;
            border-top: 2px solid #e67e22;
            color: #e67e22;
        }
        .order-button {
            width: 100%;
            background: #e67e22;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s ease;
        }
        .order-button:active {
            transform: scale(0.98);
            background: #d35400;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🍽️ МЕНЮ СТОЛОВОЙ</h1>
    <div id="menuList"></div>
    <div class="cart-block">
        <div class="cart-title">🛒 КОРЗИНА</div>
        <div id="cartList">✨ Пусто</div>
        <div class="total" id="totalAmount">💰 ИТОГО: 0.00 ₽</div>
        <button id="orderBtn" class="order-button">✅ ОФОРМИТЬ ЗАКАЗ</button>
    </div>
</div>

<script>
    // ---- МЕНЮ (точь-в-точь из твоей таблицы) ----
    const menu = {
        "Супы": [
            { name: "Суп-пюре сырный с копчеными колбасками", price: 3.80 },
            { name: "Холодник со сметаной", price: 3.00 }
        ],
        "Гарниры": [
            { name: "Картофельное пюре", price: 2.50 },
            { name: "Спагетти со сливочным соусом", price: 2.80 }
        ],
        "Мясные": [
            { name: "Биточек из свинины", price: 6.60 },
            { name: "Филе запеченное по-французски", price: 6.70 },
            { name: "Гнездышко с ветчиной и сыром", price: 6.80 },
            { name: "Гуляш из свинины", price: 6.80 }
        ],
        "Салаты": [
            { name: "Летний", price: 3.20 },
            { name: "Свежесть", price: 2.60 }
        ],
        "Фитнес бокс": [
            { name: "Фитнес бокс с курицей", price: 8.00 }
        ],
        "Пицца/Закуски": [
            { name: "Пицца на тосте", price: 3.00 },
            { name: "Конвертик из лаваша", price: 4.00 }
        ],
        "Напитки": [
            { name: "Сок в ассортименте", price: 1.50 },
            { name: "Кефир", price: 1.00 }
        ]
    };

    let cart = {};

    // ---- Инициализация Telegram ----
    let tg = null;
    if (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp) {
        tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        // Синяя кнопка Telegram (скрываем, используем свою)
        tg.MainButton.hide();
    }

    // ---- Отрисовка меню ----
    function renderMenu() {
        const container = document.getElementById('menuList');
        if (!container) return;
        container.innerHTML = '';
        for (let cat in menu) {
            const catDiv = document.createElement('div');
            catDiv.className = 'cat';
            catDiv.innerHTML = `<div class="cat-title">🍽️ ${cat}</div>`;
            menu[cat].forEach(item => {
                const qty = cart[item.name]?.qty || 0;
                catDiv.innerHTML += `
                    <div class="item">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">${item.price.toFixed(2)}₽</div>
                        <div class="item-controls">
                            <button class="minus-btn" data-name="${item.name}" data-price="${item.price}">−</button>
                            <span class="item-qty">${qty}</span>
                            <button class="plus-btn" data-name="${item.name}" data-price="${item.price}">+</button>
                        </div>
                    </div>
                `;
            });
            container.appendChild(catDiv);
        }

        // Обработчики +/-
        document.querySelectorAll('.plus-btn').forEach(btn => {
            btn.onclick = () => {
                let name = btn.dataset.name;
                let price = parseFloat(btn.dataset.price);
                if (cart[name]) cart[name].qty++;
                else cart[name] = { price, qty: 1 };
                refreshAll();
            };
        });
        document.querySelectorAll('.minus-btn').forEach(btn => {
            btn.onclick = () => {
                let name = btn.dataset.name;
                if (cart[name]) {
                    if (cart[name].qty > 1) cart[name].qty--;
                    else delete cart[name];
                    refreshAll();
                }
            };
        });
    }

    // ---- Отрисовка корзины ----
    function renderCart() {
        const cartDiv = document.getElementById('cartList');
        const totalDiv = document.getElementById('totalAmount');
        const orderBtn = document.getElementById('orderBtn');
        const items = Object.entries(cart);
        
        if (items.length === 0) {
            cartDiv.innerHTML = '<div class="cart-empty">✨ Корзина пуста</div>';
            totalDiv.innerHTML = '💰 ИТОГО: 0.00 ₽';
            if (orderBtn) orderBtn.style.display = 'none';
            return;
        }
        
        let total = 0;
        let html = '';
        for (let [name, data] of items) {
            const sum = data.price * data.qty;
            total += sum;
            html += `
                <div class="cart-item">
                    <span>${name} × ${data.qty}</span>
                    <span style="color:#e67e22; font-weight:600;">${sum.toFixed(2)} ₽</span>
                    <button class="remove-from-cart" data-name="${name}" style="background:none; border:none; font-size:18px; cursor:pointer;">🗑</button>
                </div>
            `;
        }
        cartDiv.innerHTML = html;
        totalDiv.innerHTML = `💰 ИТОГО: ${total.toFixed(2)} ₽`;
        
        // Показываем кнопку заказа
        if (orderBtn) orderBtn.style.display = 'block';
        
        // Обработчики удаления из корзины
        document.querySelectorAll('.remove-from-cart').forEach(btn => {
            btn.onclick = () => {
                delete cart[btn.dataset.name];
                refreshAll();
            };
        });
    }

    // ---- Отправка заказа боту ----
    function sendOrder() {
        const items = Object.entries(cart);
        if (items.length === 0) {
            if (tg) tg.showAlert("🛒 Корзина пуста");
            else alert("🛒 Корзина пуста");
            return;
        }
        
        let total = 0;
        let text = '';
        for (let [name, data] of items) {
            const sum = data.price * data.qty;
            total += sum;
            text += `${name} × ${data.qty} = ${sum.toFixed(2)} ₽\n`;
        }
        
        const order = {
            cart: cart,
            total: total.toFixed(2),
            text: `🍽️ НОВЫЙ ЗАКАЗ!\n———————————\n${text}———————————\n🍽️ К оплате: ${total.toFixed(2)} ₽`
        };
        
        if (tg) {
            tg.sendData(JSON.stringify(order));
            tg.showAlert("✅ Заказ отправлен!");
        } else {
            // Режим браузера - показываем заказ в консоли и алерте
            console.log("ЗАКАЗ:", order.text);
            alert("✅ Заказ отправлен!\n\n" + order.text);
        }
        
        // Очищаем корзину
        cart = {};
        refreshAll();
        
        if (tg) {
            setTimeout(() => tg.close(), 1200);
        }
    }

    // ---- Полное обновление интерфейса ----
    function refreshAll() {
        renderMenu();
        renderCart();
    }

    // ---- Обработчик кнопки заказа ----
    const orderBtn = document.getElementById('orderBtn');
    if (orderBtn) {
        orderBtn.onclick = sendOrder;
    }

    // ---- Старт ----
    refreshAll();
</script>
</body>
</html>
